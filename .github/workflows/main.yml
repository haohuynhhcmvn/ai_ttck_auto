name: Auto Video Stock Production

on:
  schedule:
    # 1. 06:30 VN (00:00 UTC)
    - cron: "30 23 * * 0-6"

    # 2. 19:00 VN (12:00 UTC)
    - cron: "0 12 * * 0-6"
    
    # Giữ lại các mốc cũ nếu anh muốn chạy song song:
    # 1. 02:15 UTC (09:15 VN)
    # - cron: "15 2 * * 1-5"
    # 2. 04:30 UTC (11:30 VN)
    # - cron: "30 4 * * 1-5"
    # 3. 08:15 UTC (15:15 VN)
    # - cron: "15 8 * * 1-5"
    # 4. 13:00 UTC (20:00 VN)
    # - cron: "0 13 * * 1-5"

  workflow_dispatch: # Thêm dòng này để anh có thể bấm chạy thủ công khi cần test

jobs:
  build:
    runs-on: ubuntu-latest
    
    # Thiết lập biến môi trường toàn cục cho Múi giờ
    env:
      TZ: Asia/Ho_Chi_Minh
      PYTHONIOENCODING: utf-8
      LANG: C.UTF-8
    steps:
      # --- BƯỚC 1: LẤY CODE TỪ REPOSITORY ---
      - name: Checkout Code
        uses: actions/checkout@v3

      # --- BƯỚC 2: THIẾT LẬP PYTHON & CACHING ---
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
          cache: 'pip' # Lưu lại các thư viện đã tải để lần sau chạy nhanh hơn (giảm từ 2-3 phút xuống vài giây)

      # --- BƯỚC 3: CÀI ĐẶT CÁC PHẦN MỀM HỆ THỐNG ---
      - name: Install System Dependencies (FFmpeg & ImageMagick)
        run: |
          sudo apt-get update -qq
          # Cài đặt FFmpeg (xử lý video) và ImageMagick (xử lý ảnh/chữ)
          sudo apt-get install -y -qq ffmpeg imagemagick fonts-dejavu-core --no-install-recommends
          # MỞ KHÓA POLICY: Rất quan trọng để ImageMagick có quyền ghi đè chữ lên video/ảnh
          sudo sed -i 's/policy domain="path" rights="none"/policy domain="path" rights="read,write"/' /etc/ImageMagick-6/policy.xml

      # --- BƯỚC 4: CÀI ĐẶT THƯ VIỆN PYTHON ---
      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # --- BƯỚC 5: CHẠY SCRIPT CHÍNH (SẢN XUẤT VIDEO) ---
      - name: Run Production Script
        env:
          # Các khóa bảo mật lấy từ Settings > Secrets > Actions của GitHub
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          YOUTUBE_TOKEN_PICKLE: ${{ secrets.YOUTUBE_TOKEN_PICKLE }}
          # --- THÊM FB VÀO ĐÂY ---
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
          # Thêm biến ngày giờ để Python có thể sử dụng nếu cần
          CURRENT_DATE: $(date +'%Y-%m-%d %H:%M:%S')
        run: python run.py

      # --- BƯỚC 6: LƯU TRỮ KẾT QUẢ (ARTIFACTS) ---
      - name: Upload Video Result
        uses: actions/upload-artifact@v4
        if: always() # Luôn thực hiện bước này kể cả khi script Run bị lỗi để bạn có thể tải log/video lỗi về kiểm tra
        with:
          name: stock-video-${{ github.run_id }} # Tên file unique theo mỗi lần chạy
          path: |
            output_*.mp4
            logs/*.txt
          retention-days: 1 # Xóa sau 24h để tiết kiệm bộ nhớ cho kho lưu trữ GitHub
